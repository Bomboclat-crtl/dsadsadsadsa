  <div class="container py-2">
    <a class="navbar-brand fw-bold" href="index.html">EcoMarket</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuEco">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menuEco">
      <ul class="navbar-nav ms-auto gap-lg-2">
        <li class="nav-item"><a class="nav-link active" href="index.html">Verduras</a></li>
        <li class="nav-item"><a class="nav-link" href="segundaP.html">Frutas</a></li>

</nav>

<header class="container py-4">
  <div class="hero p-4 p-md-5">
    <div class="row w-100 align-items-center">
      <div class="col-lg-8">
        <h1 class="display-5 fw-bold">Verduras</h1>
        <p class="lead mb-0">Productos frescos, simples de buscar y mostrados en una sola página.</p>
      </div>
    </div>
  </div>
</header>

<main class="container pb-4">
  <section class="section-box p-3 p-md-4">
    <div class="row g-3 mb-3">
      <div class="col-lg-8">
        <input id="buscador" type="text" class="form-control" placeholder="Buscar verdura..." oninput="renderProductos()">
      </div>
      <div class="col-lg-4 d-grid">
        <button class="btn btn-farm" type="button" onclick="document.getElementById('buscador').value=''; renderProductos();">Limpiar</button>
      </div>
    </div>

    <div id="productos" class="row g-3"></div>
  </section>
</main>

<footer class="py-4 mt-4">
  <div class="container text-center">
    <p class="mb-0">EcoMarket - Verduras</p>
  </div>
